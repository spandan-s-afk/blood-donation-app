<!DOCTYPE html>
<html>
<head><title>Edit Donor</title></head>
<body>

<h2>Edit Donor</h2>

<form method="POST" action="/update/{{ donor[0] }}">
    <input type="text" name="name" value="{{ donor[1] }}" required><br><br>
    <input type="number" name="age" value="{{ donor[2] }}" required><br><br>
    <input type="text" name="blood_group" value="{{ donor[3] }}" required><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="/">Back</a>

</body>
</html>
