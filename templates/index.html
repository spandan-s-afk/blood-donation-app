<!DOCTYPE html>
<html>
<head>
    <title>Blood Donation App</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: #c0392b;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 40px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #ecf0f1;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🩸 Blood Donation</h1>

    <h2>Available Donors</h2>
    <ul>
        {% for donor in donors %}
            <li>{{ donor }}</li>
        {% endfor %}
    </ul>

    <h2>Add Donor</h2>
    <form method="POST" action="/add">
        <input type="text" name="blood_group" placeholder="Enter Blood Group" required>
        <button type="submit">Add</button>
    </form>
</div>

</body>
</html>
